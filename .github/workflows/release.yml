name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package binary
        run: |
          BIN_PATH=$(swift build -c release --show-bin-path)
          mkdir -p staging
          cp "$BIN_PATH/roadrunner" staging/roadrunner
          chmod +x staging/roadrunner
          tar czf roadrunner-macos-arm64.tar.gz -C staging roadrunner

      - name: Create installer package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p /tmp/roadrunner-pkg/usr/local/bin
          cp staging/roadrunner /tmp/roadrunner-pkg/usr/local/bin/
          pkgbuild \
            --root /tmp/roadrunner-pkg \
            --identifier com.argylebits.roadrunner \
            --version "$VERSION" \
            --install-location / \
            roadrunner-${VERSION}-installer.pkg

      - name: Build runner image
        run: |
          cd images
          container build \
            -t ghcr.io/argylebits/roadrunner:latest \
            -t ghcr.io/argylebits/roadrunner:${GITHUB_REF_NAME#v} \
            -f Containerfile -m 4G .

      - name: Push runner image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | container login ghcr.io -u "${{ github.actor }}" --password-stdin
          container image push ghcr.io/argylebits/roadrunner:latest
          container image push ghcr.io/argylebits/roadrunner:${GITHUB_REF_NAME#v}

      - name: Create GitHub Release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" \
            --title "Roadrunner $VERSION" \
            --generate-notes \
            roadrunner-${VERSION}-installer.pkg \
            roadrunner-macos-arm64.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_ARM64=$(shasum -a 256 roadrunner-macos-arm64.tar.gz | awk '{print $1}')

          FORMULA=$(cat <<RUBY
          class Roadrunner < Formula
            desc "Ephemeral Linux CI runners on macOS"
            homepage "https://github.com/argylebits/Roadrunner"
            version "${VERSION}"
            license "Apache-2.0"

            depends_on :macos
            depends_on arch: :arm64

            url "https://github.com/argylebits/Roadrunner/releases/download/v#{version}/roadrunner-macos-arm64.tar.gz"
            sha256 "${SHA_ARM64}"

            def install
              bin.install "roadrunner"
            end

            test do
              assert_match "roadrunner", shell_output("#{bin}/roadrunner --help")
            end
          end
          RUBY
          )

          EXISTING=$(gh api repos/argylebits/homebrew-tap/contents/Formula/roadrunner.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            gh api -X PUT repos/argylebits/homebrew-tap/contents/Formula/roadrunner.rb \
              -f message="Update roadrunner formula to ${VERSION}" \
              -f content="$(echo "$FORMULA" | base64)" \
              -f sha="$EXISTING"
          else
            gh api -X PUT repos/argylebits/homebrew-tap/contents/Formula/roadrunner.rb \
              -f message="Add roadrunner formula ${VERSION}" \
              -f content="$(echo "$FORMULA" | base64)"
          fi
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

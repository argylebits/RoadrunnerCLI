name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Create installer package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p /tmp/gump-pkg/usr/local/bin
          cp .build/release/gump /tmp/gump-pkg/usr/local/bin/
          pkgbuild \
            --root /tmp/gump-pkg \
            --identifier com.argylebits.gump \
            --version "$VERSION" \
            --install-location / \
            gump-${VERSION}-installer.pkg

      - name: Build runner image
        run: |
          cd images
          container build \
            -t ghcr.io/argylebits/gump-runner:latest \
            -t ghcr.io/argylebits/gump-runner:${GITHUB_REF_NAME#v} \
            -f Containerfile -m 4G .

      - name: Push runner image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | container login ghcr.io -u "${{ github.actor }}" --password-stdin
          container image push ghcr.io/argylebits/gump-runner:latest
          container image push ghcr.io/argylebits/gump-runner:${GITHUB_REF_NAME#v}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" \
            --title "Gump $VERSION" \
            --generate-notes \
            gump-${VERSION}-installer.pkg
